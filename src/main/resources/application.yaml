spring:
  application:
    name: reminder-service

  profiles:
    active: local

server:
  port: 8084

gateway:
  base-url: ${GATEWAY_BASE_URL:http://localhost:8090}
  internal-token: ${GATEWAY_INTERNAL_TOKEN:}

reminder:
  timezone: ${REMINDER_TIMEZONE:Europe/Sofia}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

---
# === Local profile (PostgreSQL via kubectl port-forward) ===
# Prerequisites:
#   1. kubectl port-forward -n notes-cloud svc/postgres 5432:5432
#   2. CREATE SCHEMA IF NOT EXISTS reminder; (веднъж след setup.ps1)
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/notes_cloud
    driver-class-name: org.postgresql.Driver
    username: notes_cloud_user
    password: notes_cloud_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: reminder
        format_sql: true

---
# === Prod profile (PostgreSQL, used in Kubernetes) ===
#
# DB connection is built by DataSourceConfig from DatabaseProperties.
# Env vars come from postgres-config (ConfigMap) and postgres-secret (Secret)
# via envFrom in the deployment manifest.
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: reminder
        format_sql: false

app:
  database:
    host: ${DB_HOST:postgres}
    port: ${DB_PORT:5432}
    name: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
